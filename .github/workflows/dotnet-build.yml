name: .NET Build (Windows)

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-windows:
    name: Build LibreRally.Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj

      - name: Restore
        run: dotnet restore LibreRally.Windows/LibreRally.Windows.csproj

      - name: Build
        run: dotnet build LibreRally.Windows/LibreRally.Windows.csproj -c Release --no-restore --nologo -v minimal --tl:off
