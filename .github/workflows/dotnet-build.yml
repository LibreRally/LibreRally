name: .NET Build Artifacts (Windows Runner)

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-artifacts:
    name: Publish ${{ matrix.platform }} ${{ matrix.rid }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            rid: win-x64
            project: LibreRally.Windows/LibreRally.Windows.csproj
          - platform: windows
            rid: win-arm64
            project: LibreRally.Windows/LibreRally.Windows.csproj
          - platform: linux
            rid: linux-x64
            project: LibreRally.Linux/LibreRally.Linux.csproj
          - platform: linux
            rid: linux-arm64
            project: LibreRally.Linux/LibreRally.Linux.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj

      - name: Restore
        run: dotnet restore ${{ matrix.project }} -r ${{ matrix.rid }}

      - name: Publish
        run: dotnet publish ${{ matrix.project }} -c Release -r ${{ matrix.rid }} --self-contained false --no-restore --nologo -v minimal --tl:off -o "${{ github.workspace }}/artifacts/${{ matrix.platform }}-${{ matrix.rid }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LibreRally-${{ matrix.platform }}-${{ matrix.rid }}
          path: ${{ github.workspace }}/artifacts/${{ matrix.platform }}-${{ matrix.rid }}
          if-no-files-found: error
