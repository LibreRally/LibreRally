name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: # Specify your branches here
      - main # The 'main' branch
      - 'releases/*' # The release branches

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}  # to check out the PR head commit when available
          fetch-depth: 0  # a full history is required for pull request analysis
      - name: 'Pull Qodana Docker Image'
        run: docker pull jetbrains/qodana-cdnet:2026.1-eap
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2026.1-eap
        with:
          pr-mode: false
          args: --image jetbrains/qodana-cdnet:2026.1-eap
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
          QODANA_ENDPOINT: 'https://qodana.cloud'
